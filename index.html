<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EL PUERTO - Mariscos & Cervezas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --primary: #0077B6; --secondary: #ADE8F4; --accent: #FB8500; --dark: #023E8A; --white: #FFFFFF; --success: #25D366; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 100px; color: var(--dark); }

        /* HEADER & SEARCH */
        header { background: var(--white); padding: 20px 0 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 0 0 25px 25px; }
        .brand { text-align: center; font-weight: 900; font-size: 22px; color: var(--primary); letter-spacing: 1px; margin-bottom: 15px; }
        .search-bar { margin: 0 20px 15px; background: #f1f5f9; border-radius: 15px; display: flex; align-items: center; padding: 12px 15px; border: 1px solid #e2e8f0; }
        .search-bar input { border: none; background: transparent; width: 100%; outline: none; margin-left: 10px; font-size: 15px; font-weight: 500; }
        
        /* CATEGORIAS CON ICONOS NUEVOS */
        .cat-scroll { display: flex; overflow-x: auto; padding: 0 20px 10px; gap: 15px; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-card { display: flex; flex-direction: column; align-items: center; gap: 8px; background: white; padding: 15px; border-radius: 20px; min-width: 85px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s; border: 1px solid #f1f5f9; }
        .cat-card.active { background: var(--primary); border-color: var(--primary); transform: translateY(-5px); }
        .cat-card span.material-symbols-rounded { font-size: 28px; color: var(--primary); }
        .cat-card.active span, .cat-card.active b { color: white; }
        .cat-card b { font-size: 11px; text-transform: uppercase; color: #64748b; }

        /* GRID DE PRODUCTOS */
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; }
        .item-card { background: white; border-radius: 22px; overflow: hidden; display: flex; padding: 12px; gap: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .item-img { width: 95px; height: 95px; border-radius: 18px; object-fit: cover; }
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-title { font-size: 16px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
        .item-desc { font-size: 12px; color: #64748b; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .item-price { font-size: 18px; font-weight: 900; color: var(--primary); }
        
        .add-btn { background: var(--secondary); color: var(--primary); border: none; width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .add-btn:active { transform: scale(0.9); background: var(--primary); color: white; }

        /* FORMULARIO DE PEDIDO REDISEÑADO */
        .order-container { display: flex; flex-direction: column; gap: 18px; }
        .input-box { position: relative; display: flex; align-items: center; }
        .input-box span { position: absolute; left: 15px; color: var(--primary); }
        .input-box input, .input-box textarea { width: 100%; padding: 15px 15px 15px 45px; border-radius: 18px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 15px; outline: none; transition: 0.3s; }
        .input-box input:focus, .input-box textarea:focus { border-color: var(--primary); background: white; box-shadow: 0 10px 20px rgba(0,119,182,0.05); }

        .total-banner { background: var(--dark); color: white; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .wa-btn { background: var(--success); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); }

        /* NAVIGATION */
        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #f1f5f9; padding-bottom: 10px; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 11px; font-weight: 700; gap: 4px; position: relative; }
        .nav-btn.active { color: var(--primary); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; border: 2px solid white; }

        /* BOTTOM SHEET */
        #overlay { position: fixed; inset: 0; background: rgba(2, 62, 138, 0.4); backdrop-filter: blur(4px); z-index: 1000; display: none; }
        #sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-radius: 35px 35px 0 0; z-index: 1001; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); padding: 30px; max-height: 90vh; overflow-y: auto; }
        #sheet.open { bottom: 0; }
        .handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 10px; margin: -15px auto 20px; }

        #no-data { display: none; text-align: center; padding: 50px 20px; flex-direction: column; align-items: center; gap: 15px; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeSheet()"></div>
    <div id="sheet"><div class="handle"></div><div id="sheetContent"></div></div>

    <header>
        <div class="brand">⚓ EL PUERTO ⚓</div>
        <div class="search-bar">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="q" placeholder="Buscar ceviche, pulpo, chelas..." onkeyup="search()">
        </div>
        <div class="cat-scroll" id="cats"></div>
    </header>

    <main class="grid" id="menu"></main>
    <div id="no-data">
        <span class="material-symbols-rounded" style="font-size: 60px;">sailing</span>
        <p><b>Ese pez se nos escapó...</b><br>Prueba buscando otra cosa.</p>
    </div>

    <nav>
        <div class="nav-btn active" onclick="location.reload()">
            <span class="material-symbols-rounded">restaurant</span>Menú
        </div>
        <div class="nav-btn" onclick="openCart()">
            <span class="material-symbols-rounded">shopping_bag</span>Pedido
            <div id="count" class="cart-count">0</div>
        </div>
        <div class="nav-btn" onclick="openInfo()">
            <span class="material-symbols-rounded">explore</span>Info
        </div>
    </nav>

    <script>
        const MENU = [
            // ENTRADAS (6)
            { id: 1, cat: "Entradas", title: "Empanada de Camarón", price: 45, desc: "Frita al momento, rellena de camarón guisado.", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=300" },
            { id: 2, cat: "Entradas", title: "Toritos de Chile", price: 120, desc: "4 Chiles caribe rellenos de marlines y queso.", img: "https://images.unsplash.com/photo-1603048588665-791ca8aea617?w=300" },
            { id: 3, cat: "Entradas", title: "Orden de Papas", price: 65, desc: "Papas gajo con especias de la casa.", img: "https://images.unsplash.com/photo-1573082801974-06c905329511?w=300" },
            { id: 4, cat: "Entradas", title: "Chicharrón de Pescado", price: 165, desc: "Trocitos de lonja de pescado bien doraditos.", img: "https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?w=300" },
            { id: 5, cat: "Entradas", title: "Guacamole Puerto", price: 85, desc: "Con totopos artesanales y pico de gallo.", img: "https://images.unsplash.com/photo-1541832676-9b763b0239ab?w=300" },
            { id: 6, cat: "Entradas", title: "Consomé Chico", price: 40, desc: "Caldo de camarón concentrado (250ml).", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=300" },

            // MARISCOS FRÍOS / TOSTADAS (8)
            { id: 7, cat: "Mariscos", title: "Aguachile Verde", price: 230, desc: "Camarón curtido en limón con chile chiltepín.", img: "https://images.unsplash.com/photo-1534604973900-c41ab4c5e638?w=300" },
            { id: 8, cat: "Mariscos", title: "Aguachile Negro", price: 245, desc: "Salsa negra de cenizas de habanero, ¡Pica rico!", img: "https://images.unsplash.com/photo-1534604973900-c41ab4c5e638?w=300" },
            { id: 9, cat: "Mariscos", title: "Ceviche de Pescado", price: 160, desc: "Clásico con tomate, cebolla, cilantro y mucho limón.", img: "https://images.unsplash.com/photo-1535400255456-9842f9243cb9?w=300" },
            { id: 10, cat: "Mariscos", title: "Tostada de Pulpo", price: 95, desc: "Pulpo suave con mayonesa chipotle y aguacate.", img: "https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?w=300" },
            { id: 11, cat: "Mariscos", title: "Tostada de Atún", price: 110, desc: "Cortes frescos de atún con cebolla frita.", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=300" },
            { id: 12, cat: "Mariscos", title: "Cóctel Mixto Grande", price: 220, desc: "Camarón, pulpo y ostión en salsa coctelera.", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=300" },
            { id: 13, cat: "Mariscos", title: "Ostiones en Concha", price: 190, desc: "Docena de ostiones frescos de la región.", img: "https://images.unsplash.com/photo-1615141982883-c7ad0e69fd62?w=300" },
            { id: 14, cat: "Mariscos", title: "Torre de Mariscos", price: 350, desc: "Mezcla de todo el puerto en una torre imperial.", img: "https://images.unsplash.com/photo-1551248429-4285544d7c17?w=300" },

            // ESPECIALIDADES CALIENTES (8)
            { id: 15, cat: "Fuertes", title: "Mojarra Frita", price: 210, desc: "Mojarra entera de 500g, al ajo o diabla.", img: "https://images.unsplash.com/photo-1580476262798-bddd9f4b7369?w=300" },
            { id: 16, cat: "Fuertes", title: "Filete Relleno", price: 240, desc: "Relleno de mariscos y gratinado con queso.", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=300" },
            { id: 17, cat: "Fuertes", title: "Camarones al Coco", price: 260, desc: "Empanizados con coco, acompañados de salsa mango.", img: "https://images.unsplash.com/photo-1559739511-e9bb7657a673?w=300" },
            { id: 18, cat: "Fuertes", title: "Pulpo a las Brasas", price: 320, desc: "Marinado en adobo de la casa, con papas.", img: "https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=300" },
            { id: 19, cat: "Fuertes", title: "Salmón Teriyaki", price: 295, desc: "Corte premium a la plancha con verduras.", img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=300" },
            { id: 20, cat: "Fuertes", title: "Caldo de Mariscos", price: 230, desc: "Gran variedad de mariscos en caldo hirviendo.", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=300" },
            { id: 21, cat: "Fuertes", title: "Tacos Gobernador", price: 145, desc: "Orden de 3 piezas con mucho queso y camarón.", img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300" },
            { id: 22, cat: "Fuertes", title: "Pasta Frutti di Mare", price: 210, desc: "Fetuccini con salsa pomodoro y mariscos.", img: "https://images.unsplash.com/photo-1563379091339-03b21bc4a4f8?w=300" },

            // BEBIDAS (8)
            { id: 23, cat: "Chelas", title: "Cubetazo (10 medias)", price: 380, desc: "Nacionales (Corona, Victoria, Modelo).", img: "https://images.unsplash.com/photo-1566633806327-68e152aaf26d?w=300" },
            { id: 24, cat: "Chelas", title: "Michelada Puerto", price: 95, desc: "Tarro 1L con mix de salsas y camarones.", img: "https://images.unsplash.com/photo-1600100414771-46487e91459a?w=300" },
            { id: 25, cat: "Chelas", title: "Cerveza Artesanal", price: 110, desc: "IPA o Porter local bien fría.", img: "https://images.unsplash.com/photo-1535958636474-b021ee887b13?w=300" },
            { id: 26, cat: "Bebidas", title: "Limonada/Naranjada", price: 55, desc: "Natural o Mineral, refrescante.", img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=300" },
            { id: 27, cat: "Bebidas", title: "Clamatada Preparada", price: 75, desc: "Sin alcohol, con apio y salsas.", img: "https://images.unsplash.com/photo-1541658016709-8273f5859d1c?w=300" },
            { id: 28, cat: "Bebidas", title: "Refresco", price: 35, desc: "Coca-Cola, Sprite, Sidral (355ml).", img: "https://images.unsplash.com/photo-1581006852262-e4307cf6283a?w=300" },
            { id: 29, cat: "Bebidas", title: "Copa de Vino", price: 125, desc: "Vino blanco ideal para mariscos.", img: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=300" },
            { id: 30, cat: "Bebidas", title: "Margarita Clásica", price: 135, desc: "Tequila, limón y controy en las rocas.", img: "https://images.unsplash.com/photo-1542337352-4493fe6c05eb?w=300" },
        ];

        const CATS = [
            { id: "Todos", icon: "dinner_dining" },
            { id: "Entradas", icon: "tapas" },
            { id: "Mariscos", icon: "set_meal" },
            { id: "Fuertes", icon: "restaurant" },
            { id: "Chelas", icon: "sports_bar" },
            { id: "Bebidas", icon: "local_bar" }
        ];

        let cart = [];
        let filter = "Todos";

        function renderCats() {
            document.getElementById('cats').innerHTML = CATS.map(c => `
                <div class="cat-card ${c.id === filter ? 'active' : ''}" onclick="setCat('${c.id}')">
                    <span class="material-symbols-rounded">${c.icon}</span>
                    <b>${c.id}</b>
                </div>`).join('');
        }

        function renderMenu() {
            const data = filter === "Todos" ? MENU : MENU.filter(p => p.cat === filter);
            document.getElementById('menu').innerHTML = data.map(p => `
                <div class="item-card" onclick="openItem(${p.id})">
                    <img src="${p.img}" class="item-img">
                    <div class="item-details">
                        <div class="item-title">${p.title}</div>
                        <div class="item-desc">${p.desc}</div>
                        <div class="item-footer">
                            <div class="item-price">$${p.price}</div>
                            <button class="add-btn"><span class="material-symbols-rounded">add</span></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function setCat(c) { filter = c; renderCats(); renderMenu(); }

        function search() {
            const val = document.getElementById('q').value.toLowerCase();
            const cards = document.querySelectorAll('.item-card');
            let found = 0;
            cards.forEach(c => {
                const isMatch = c.innerText.toLowerCase().includes(val);
                c.style.display = isMatch ? 'flex' : 'none';
                if(isMatch) found++;
            });
            document.getElementById('no-data').style.display = found === 0 ? 'flex' : 'none';
        }

        function add(id) {
            cart.push(MENU.find(m => m.id === id));
            const count = document.getElementById('count');
            count.innerText = cart.length;
            count.style.display = 'flex';
        }

        function openItem(id) {
            const p = MENU.find(m => m.id === id);
            openSheet(`
                <img src="${p.img}" style="width:100%;height:220px;border-radius:25px;object-fit:cover;margin-bottom:20px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <h2>${p.title}</h2>
                    <span style="font-size:24px;font-weight:900;color:var(--primary)">$${p.price}</span>
                </div>
                <p style="color:#64748b;line-height:1.6;margin-bottom:25px;">${p.desc}</p>
                <button onclick="add(${p.id}); closeSheet();" style="background:var(--primary);color:white;width:100%;padding:18px;border-radius:20px;border:none;font-weight:bold;font-size:16px;">
                    AGREGAR A LA ORDEN
                </button>
            `);
        }

        function openCart() {
            if(cart.length === 0) return openSheet('<div style="text-align:center;padding:40px;"><h3>¡Tu red está vacía! 🎣</h3><p>Aun no has agregado delicias del mar.</p></div>');
            
            const total = cart.reduce((s, i) => s + i.price, 0);
            openSheet(`
                <h2 style="margin-bottom:20px;text-align:center;">⚓ Finalizar Orden</h2>
                <div class="order-container">
                    <div class="input-box">
                        <span class="material-symbols-rounded">badge</span>
                        <input type="text" id="name" placeholder="Tu nombre">
                    </div>
                    <div class="input-box">
                        <span class="material-symbols-rounded">sticky_note</span>
                        <textarea id="note" placeholder="Notas (Ej. Sin cebolla, chelas heladas...)"></textarea>
                    </div>
                    <div class="total-banner">
                        <span>Total a pagar</span>
                        <b>$${total}</b>
                    </div>
                    <button class="wa-btn" onclick="sendWA(${total})">
                        <span class="material-symbols-rounded">chat</span>
                        PEDIR POR WHATSAPP
                    </button>
                </div>
            `);
        }

      function sendWA(t) {
            const n = document.getElementById('name').value;
            const note = document.getElementById('note').value || "Sin notas";
            if(!n) return alert("Por favor dinos tu nombre.");

            let msg = `*⚓ NUEVO PEDIDO - EL PUERTO*%0A*CLIENTE:* ${n}%0A%0A`;
            cart.forEach(i => msg += `• ${i.title} - $${i.price}%0A`);
            msg += `%0A*NOTAS:* ${note}%0A*TOTAL: $${t}*`;
            window.open(`https://wa.me/529381404599?text=${msg}`);
        }

        function openInfo() {
            openSheet(`
                <div style="text-align:center;padding:20px;">
                    <span class="material-symbols-rounded" style="font-size:80px;color:var(--primary)">sailing</span>
                    <h2 style="margin:15px 0;">El Puerto Mariscos</h2>
                    <p style="color:#64748b;">El sabor más fresco del malecón.</p>
                    <div style="background:#f1f5f9;padding:20px;border-radius:20px;margin-top:20px;text-align:left;">
                        <p>📍 <b>Dirección:</b> Malecón #402</p>
                        <p>⏰ <b>Horario:</b> 11:00 AM - 7:00 PM</p>
                        <p>📞 <b>Tel:</b> 981 123 4567</p>
                    </div>
                </div>
            `);
        }

        function openSheet(h) {
            document.getElementById('sheetContent').innerHTML = h;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => document.getElementById('sheet').classList.add('open'), 10);
        }

        function closeSheet() {
            document.getElementById('sheet').classList.remove('open');
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }

        renderCats(); renderMenu();
    </script>
</body>
</html>
