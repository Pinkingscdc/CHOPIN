<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BBQ's Grill - Carnes a la Parrilla</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --primary: #D32F2F; --secondary: #FFECB3; --accent: #F57C00; --dark: #212121; --white: #FFFFFF; --success: #25D366; --bg: #f8fafc; --error: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 100px; color: var(--dark); }

        header { background: var(--white); padding: 20px 0 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 0 0 25px 25px; }
        .brand { text-align: center; font-weight: 900; font-size: 24px; color: var(--primary); letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
        
        .search-bar { margin: 0 20px 15px; background: #f1f5f9; border-radius: 15px; display: flex; align-items: center; padding: 12px 15px; border: 1px solid #e2e8f0; }
        .search-bar input { border: none; background: transparent; width: 100%; outline: none; margin-left: 10px; font-size: 15px; font-weight: 500; }
        
        .cat-scroll { display: flex; overflow-x: auto; padding: 0 20px 10px; gap: 15px; scrollbar-width: none; }
        .cat-card { display: flex; flex-direction: column; align-items: center; gap: 8px; background: white; padding: 15px; border-radius: 20px; min-width: 85px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s; border: 1px solid #f1f5f9; cursor: pointer; }
        .cat-card.active { background: var(--primary); border-color: var(--primary); transform: translateY(-5px); }
        .cat-card span.material-symbols-rounded { font-size: 28px; color: var(--primary); }
        .cat-card.active span, .cat-card.active b { color: white; }
        .cat-card b { font-size: 11px; text-transform: uppercase; color: #64748b; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; }
        .item-card { background: white; border-radius: 22px; overflow: hidden; display: flex; padding: 12px; gap: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; cursor: pointer; }
        .item-img { width: 95px; height: 95px; border-radius: 18px; object-fit: cover; }
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-title { font-size: 16px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
        .item-desc { font-size: 12px; color: #64748b; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .item-price { font-size: 18px; font-weight: 900; color: var(--primary); }
        .add-btn { background: var(--secondary); color: var(--primary); border: none; width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        .ticket-visual { 
            width: 100%; background: white; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            font-family: 'Courier New', Courier, monospace; color: #000; margin-bottom: 20px; border-radius: 4px;
        }
        .ticket-visual .center { text-align: center; }
        .ticket-visual .bold { font-weight: bold; }
        .ticket-visual .separator { border-top: 1px dashed #000; margin: 10px 0; }
        .ticket-visual table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .ticket-visual th { text-align: left; border-bottom: 1px solid #000; font-size: 14px; padding-bottom: 5px; }
        .ticket-visual td { font-size: 14px; padding: 5px 0; }
        .total-section { margin-top: 10px; }
        .total-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 2px; }
        .total-row.big { font-size: 18px; margin-top: 5px; border-top: 1px double #000; padding-top: 5px; font-weight: bold; }

        .order-container { display: flex; flex-direction: column; gap: 15px; }
        .input-box { position: relative; display: flex; align-items: center; }
        .input-box span { position: absolute; left: 15px; color: var(--primary); z-index: 1; }
        .input-box input, .input-box textarea { width: 100%; padding: 15px 15px 15px 45px; border-radius: 18px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 15px; outline: none; }
        .input-error input { border-color: var(--error) !important; background: #fff1f2 !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0)} 25% {transform: translateX(-5px)} 75% {transform: translateX(5px)} }

        .pdf-btn { background: #64748b; color: white; padding: 15px; border-radius: 15px; border: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .wa-btn { background: var(--success); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); cursor: pointer; }

        .info-ficha { display: flex; flex-direction: column; gap: 15px; text-align: left; background: #f1f5f9; padding: 20px; border-radius: 20px; }
        .info-item { display: flex; align-items: center; gap: 15px; background: white; padding: 15px; border-radius: 15px; }
        .info-item span.material-symbols-rounded { font-size: 30px; color: var(--primary); background: var(--secondary); padding: 10px; border-radius: 12px; }

        .select-salsa { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px; font-weight: 600; color: var(--dark); outline: none; }

        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #f1f5f9; padding-bottom: 10px; z-index: 900; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 11px; font-weight: 700; gap: 4px; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; border: 2px solid white; }
        
        #overlay { position: fixed; inset: 0; background: rgba(33, 33, 33, 0.5); backdrop-filter: blur(4px); z-index: 1000; display: none; }
        #sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-radius: 35px 35px 0 0; z-index: 1001; transition: 0.4s; padding: 30px; max-height: 90vh; overflow-y: auto; }
        #sheet.open { bottom: 0; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeSheet()"></div>
    <div id="sheet"><div id="sheetContent"></div></div>

    <header>
        <div class="brand">🔥 BBQ's Grill 🔥</div>
        <div class="search-bar">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="q" placeholder="Buscar en el menú..." onkeyup="search()">
        </div>
        <div class="cat-scroll" id="cats"></div>
    </header>

    <main class="grid" id="menu"></main>

    <nav>
        <div class="nav-btn active" onclick="location.reload()">
            <span class="material-symbols-rounded">local_fire_department</span> Brasas
        </div>
        <div class="nav-btn" style="position:relative" onclick="openCart()">
            <span class="material-symbols-rounded">shopping_cart</span>Pedido
            <div id="count" class="cart-count">0</div>
        </div>
        <div class="nav-btn" onclick="openInfo()">
            <span class="material-symbols-rounded">badge</span>Info
        </div>
    </nav>

    <script>

            { id: 45, cat: "Snaks", title: "Costillas BBQ", price: 145, desc: "Tiernas costillas bañadas en salsa artesanal.", img: "https://images.unsplash.com/photo-1544077960-604201fe74bc?w=300" },

            /* --- BURGERS --- */
            { id: 8, cat: "Burger", title: "Tuetano Burger", price: 285, desc: "Incluye tuétano, carne premium y vegetales.", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300" },
            { id: 9, cat: "Burger", title: "Smash Bacon Jam", price: 210, desc: "Mermelada de tocino, carne, cheddar, manchego, cebolla, pepinillos", img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=300" },
            { id: 10, cat: "Burger", title: "Doble Carne", price: 210, desc: "Carne, aros de cebolla, tocino, cheddar", img: "https://images.unsplash.com/photo-1525164286253-04e68b9d942a?w=300" },
            { id: 11, cat: "Burger", title: "Smash Bleu Cheese", price: 195, desc: "Tres capas de carne, tocino, queso azul, cebolla asada, cheddar", img: "https://images.unsplash.com/photo-1607013251379-e6eecfffe234?w=300" },

            { id: 19, cat: "Burger", title: "Chistorra", price: 175, desc: "Carne, guacamole, cheddar, cebolla crujiente", img: "https://images.unsplash.com/photo-1550317138-10000687ad32?w=300" },
            { id: 20, cat: "Burger", title: "Asadera", price: 165, desc: "Salchicha asadera, carne, queso Oaxaca", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300" },
            { id: 21, cat: "Burger", title: "Chorizo Argentino", price: 165, desc: "Chorizo argentino, carne, guacamole, cheddar", img: "https://images.unsplash.com/photo-1586816001966-79b736744398?w=300" },
            { id: 22, cat: "Burger", title: "Champiñón", price: 135, desc: "Carne, champiñón fresco, queso manchego", img: "https://images.unsplash.com/photo-1499028344343-cd173ffc68a9?w=300" },
            { id: 23, cat: "Burger", title: "Hawaiana", price: 135, desc: "Piña natural, carne, jamón, queso cheddar", img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300" },
            { id: 24, cat: "Burger", title: "Sencilla", price: 110, desc: "Carne, vegetales, queso cheddar", img: "https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?w=300" },
            { id: 25, cat: "Burger", title: "Cordon Bleu", price: 165, desc: "Pechuga crujiente, tocino, jamón, queso cheddar y manchego", img: "https://images.unsplash.com/photo-1625813506062-0aeb1d7a094b?w=300" },
            { id: 26, cat: "Burger", title: "Buffalo Chicken", price: 155, desc: "Pechuga crujiente, salsa picante y aderezo ranch", img: "https://images.unsplash.com/photo-1614398751357-934d19702951?w=300" },

            /* --- PAPAS --- */
            { id: 2, cat: "Papas", title: "Papa Asada Especial", price: 110, desc: "Rellena de mantequilla, queso y carne al carbón.", img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300" },
            { id: 48, cat: "Papas", title: "Papa Mixta", price: 155, desc: "Papa asada rellena con combinación de carnes y queso.", img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300" },
            { id: 49, cat: "Papas", title: "Papa de Arrachera", price: 145, desc: "Papa asada rellena de arrachera premium y queso fundido.", img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300" }
        ];

        const CATS = [
            { id: "Todos", icon: "restaurant" },
            { id: "Boneless y Alitas", icon: "potted_plant" }, 
            { id: "Burger", icon: "lunch_dining" },
            { id: "Tacos", icon: "bakery_dining" },
            { id: "Snaks", icon: "fastfood" },
            { id: "Burritos", icon: "breakfast_dining" },
            { id: "Harina", icon: "layers" },
            { id: "Papas", icon: "ramen_dining" }
        ];

        let cart = [];
        let filter = "Todos";

        function renderCats() {
            document.getElementById('cats').innerHTML = CATS.map(c => `
                <div class="cat-card ${c.id === filter ? 'active' : ''}" onclick="setCat('${c.id}')">
                    <span class="material-symbols-rounded">${c.icon}</span>
                    <b>${c.id}</b>
                </div>`).join('');
        }

        function renderMenu() {
            const data = filter === "Todos" ? MENU : MENU.filter(p => p.cat === filter);
            document.getElementById('menu').innerHTML = data.map(p => `
                <div class="item-card" onclick="openItem(${p.id})">
                    <img src="${p.img}" class="item-img">
                    <div class="item-details">
                        <div class="item-title">${p.title}</div>
                        <div class="item-desc">${p.desc}</div>
                        <div class="item-footer">
                            <div class="item-price">$${p.price}</div>
                            <button class="add-btn"><span class="material-symbols-rounded">add</span></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function setCat(c) { filter = c; renderCats(); renderMenu(); }

        function search() {
            const val = document.getElementById('q').value.toLowerCase();
            document.querySelectorAll('.item-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        }

        function add(id, salsa = "") {
            const item = {...MENU.find(m => m.id === id)};
            if(salsa) item.title = `${item.title} (${salsa})`;
            cart.push(item);
            document.getElementById('count').innerText = cart.length;
            document.getElementById('count').style.display = 'flex';
        }

        function openItem(id) {
            const p = MENU.find(m => m.id === id);
            let salsaHtml = "";
            if(p.hasSalsa) {
                salsaHtml = `
                    <p style="margin-top:15px; font-weight:bold; font-size:14px; color:var(--dark);">Elige tu salsa:</p>
                    <select id="salsa-select" class="select-salsa">
                        <option value="Cualquier Salsa">Cualquier Salsa</option>
                        <option value="Buffalo">Buffalo</option>
                        <option value="Parmesano">Parmesano</option>
                        <option value="BBQ">BBQ</option>
                        <option value="Mango Habanero">Mango Habanero</option>
                        <option value="Ajo">Ajo</option>
                    </select>
                `;
            }
            openSheet(`
                <img src="${p.img}" style="width:100%;height:220px;border-radius:25px;object-fit:cover;margin-bottom:20px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <h2>${p.title}</h2>
                    <span style="font-size:24px;font-weight:900;color:var(--primary)">$${p.price}</span>
                </div>
                <p style="color:#64748b;line-height:1.6;margin-bottom:10px;">${p.desc}</p>
                ${salsaHtml}
                <button onclick="const s = document.getElementById('salsa-select') ? document.getElementById('salsa-select').value : ''; add(${p.id}, s); closeSheet();" style="background:var(--primary);color:white;width:100%;padding:18px;border-radius:20px;border:none;font-weight:bold;font-size:16px;margin-top:20px;">AÑADIR AL PEDIDO</button>
            `);
        }

        function openCart() {
            if(cart.length === 0) return openSheet('<div style="text-align:center;padding:40px;"><h3>¡La parrilla está fría! 🔥</h3></div>');
            const total = cart.reduce((s, i) => s + i.price, 0);
            const subtotal = total / 1.16;
            const iva = total - subtotal;
            const summary = cart.reduce((acc, curr) => {
                acc[curr.title] = (acc[curr.title] || { q: 0, p: curr.price });
                acc[curr.title].q++;
                return acc;
            }, {});

            let rows = Object.entries(summary).map(([title, info]) => `
                <tr><td>${info.q}</td><td>${title}</td><td style="text-align:right;">$${(info.q * info.p).toFixed(2)}</td></tr>`).join('');

            const fecha = new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString();

            openSheet(`
                <h2 style="text-align:center;margin-bottom:15px">Mi Pedido</h2>
                <div id="ticket-print" class="ticket-visual">
                    <div class="center"><h2 style="margin: 0;">🔥 BBQ's Grill 🔥</h2></div>
                    <div class="separator"></div>
                    <p>Fecha: ${fecha}<br>Cliente: <span id="v-name" class="bold">...</span></p>
                    <div class="separator"></div>
                    <table><thead><tr><th>Cant.</th><th>Prod.</th><th style="text-align: right;">Total</th></tr></thead><tbody>${rows}</tbody></table>
                    <div class="separator"></div>
                    <div class="total-section">
                        <div class="total-row"><span>Subtotal:</span><span>$${subtotal.toFixed(2)}</span></div>
                        <div class="total-row"><span>IVA:</span><span>$${iva.toFixed(2)}</span></div>
                        <div class="total-row big"><span>TOTAL:</span><span>$${total.toFixed(2)}</span></div>
                    </div>
                    <div id="v-note" style="font-size: 12px; margin-top: 10px; font-style: italic;">Sin notas</div>
                </div>
                <div class="order-container">
                    <div class="input-box" id="name-box"><span class="material-symbols-rounded">badge</span><input type="text" id="i-name" placeholder="Tu nombre..." onkeyup="sync()"></div>
                    <div class="input-box"><span class="material-symbols-rounded">notes</span><textarea id="i-note" placeholder="Notas..." onkeyup="sync()"></textarea></div>
                    <button class="pdf-btn" onclick="validateAction('pdf', ${total})"><span class="material-symbols-rounded">picture_as_pdf</span> PDF</button>
                    <button class="wa-btn" onclick="validateAction('wa', ${total})"><span class="material-symbols-rounded">chat</span> WHATSAPP</button>
                </div>
            `);
        }

        function sync() {
            const nameInput = document.getElementById('i-name');
            const noteInput = document.getElementById('i-note');
            if(nameInput) {
                document.getElementById('name-box').classList.remove('input-error');
                document.getElementById('v-name').innerText = nameInput.value || "...";
            }
            if(noteInput && document.getElementById('v-note')) {
                document.getElementById('v-note').innerText = noteInput.value || "Sin notas";
            }
        }

        function validateAction(type, t) {
            const nameInput = document.getElementById('i-name');
            const noteInput = document.getElementById('i-note');
            
            if(!nameInput.value.trim()) {
                document.getElementById('name-box').classList.add('input-error');
                nameInput.focus();
                return;
            }

            if(type === 'pdf') {
                html2pdf().set({ margin: 0.5, filename: 'Ticket-BBQ.pdf', html2canvas: { scale: 3 } }).from(document.getElementById('ticket-print')).save();
            } else {
                const summary = cart.reduce((acc, curr) => {
                    acc[curr.title] = (acc[curr.title] || 0) + 1;
                    return acc;
                }, {});

                let prodList = "";
                for (const [title, qty] of Object.entries(summary)) {
                    prodList += `✅ ${qty}x ${title}%0A`;
                }

                const msg = `*🔥 BBQ'S GRILL - NUEVO PEDIDO 🔥*%0A%0A` +
                            `*CLIENTE:* ${nameInput.value.trim()}%0A` +
                            `------------------------------%0A` +
                            prodList +
                            `------------------------------%0A` +
                            `*NOTA:* ${noteInput.value || 'Sin notas'}%0A%0A` +
                            `*TOTAL A PAGAR: $${t.toFixed(2)}*%0A%0A` +
                            `_Pedido enviado desde la App Web_`;

                window.open(`https://wa.me/529381404599?text=${msg}`);
            }
        }

        function openInfo() {
            openSheet(`
                <h2 style="text-align:center;margin-bottom:20px;">Información</h2>
                <div class="info-ficha">
                    <div class="info-item"><span class="material-symbols-rounded">location_on</span><p>Av. De las Brasas #123</p></div>
                    <div class="info-item"><span class="material-symbols-rounded">schedule</span><p>1:00 PM - 11:00 PM</p></div>
                    <div class="info-item"><span class="material-symbols-rounded">call</span><p>938-140-4599</p></div>
                </div>
            `);
        }

        function openSheet(h) { document.getElementById('sheetContent').innerHTML = h; document.getElementById('overlay').style.display = 'block'; setTimeout(() => document.getElementById('sheet').classList.add('open'), 10); }
        function closeSheet() { document.getElementById('sheet').classList.remove('open'); setTimeout(() => document.getElementById('overlay').style.display = 'none', 300); }

        renderCats(); renderMenu();
    </script>
</body>
</html>
